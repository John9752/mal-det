services:
  - type: web
    name: poshanai-backend
    runtime: python
    buildCommand: pip install -r requirements.txt && python -m app.ml.train
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_PATH
        value: /data/malnutrition.db
    disk:
      name: poshanai-sqlite-disk
      mountPath: /data
      sizeGB: 1
